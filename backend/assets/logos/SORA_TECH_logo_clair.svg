<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
  </defs>

  <!-- Fond clair -->
  <rect x="0" y="0" width="600" height="220" rx="20" fill="#F5F7FC"/>
  <rect x="0" y="0" width="600" height="220" rx="20" fill="none" stroke="#DDE3F0" stroke-width="1"/>

  <!-- Hexagone icône -->
  <polygon points="74,42 114,42 134,77 114,112 74,112 54,77" fill="#EEF4FF"/>
  <polygon points="74,42 114,42 134,77 114,112 74,112 54,77" fill="none" stroke="#0066FF" stroke-width="2"/>

  <!-- S stylisé -->
  <text x="94" y="82" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, serif" font-size="38" font-weight="700" fill="url(#g1)">S</text>

  <!-- Accent pixels -->
  <rect x="128" y="102" width="6" height="6" rx="1" fill="#FF6B00"/>
  <rect x="137" y="102" width="6" height="6" rx="1" fill="#0099FF" opacity="0.6"/>
  <rect x="128" y="111" width="6" height="6" rx="1" fill="#0099FF" opacity="0.4"/>

  <!-- Nom SORA -->
  <text x="165" y="68" dominant-baseline="central"
    font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="4"
    fill="#0A0E1A">SORA</text>

  <!-- TECH -->
  <text x="165" y="95" dominant-baseline="central"
    font-family="Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="9"
    fill="#0066FF">TECH</text>

  <!-- Ligne fine -->
  <line x1="165" y1="110" x2="480" y2="110" stroke="#0A0E1A" stroke-width="0.5" opacity="0.1"/>

  <!-- COMPANY -->
  <text x="165" y="133" dominant-baseline="central"
    font-family="Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="3"
    fill="#8899CC">COMPANY</text>

  <!-- Tagline -->
  <text x="94" y="170" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="9.5" letter-spacing="1.5"
    fill="#99AACC">Digitalisons votre avenir</text>

  <!-- Décoration circuit -->
  <circle cx="510" cy="50" r="2" fill="#0066FF" opacity="0.4"/>
  <circle cx="525" cy="65" r="1.5" fill="#0099FF" opacity="0.35"/>
  <circle cx="535" cy="50" r="1" fill="#FF6B00" opacity="0.5"/>
  <line x1="510" y1="50" x2="525" y2="65" stroke="#0066FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="525" y1="65" x2="535" y2="50" stroke="#0066FF" stroke-width="0.8" opacity="0.25"/>
</svg>
